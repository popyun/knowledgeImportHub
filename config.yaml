# Obsidian Knowledge Import Hub - Configuration
# All paths, engines, thresholds, and processing settings

vault:
  root: "D:/test-temp/ocr_output"
  raw_folder: "00-RAW"
  wiki_base: "10-WIKI"
  audit_folder: "99-Audit/OCR-Pending"
  archive_folder: "99-Archive"

processing:
  watch_delay_seconds: 5
  max_worker_threads: 2
  confidence_threshold: 0.85
  skip_patterns: ["**/.*", "**/*.tmp"]

ocr:
  engines:
    text_default: "paddleocr_vl"
    table_complex: "paddleocr_vl"
    math_special: "mathpix_api"
  mathpix_api_key: ""
  paddleocr:
    lang: "ch"
    use_angle_cls: true
    det_limit_side_len: 1920
    det_db_thresh: 0.2
    det_db_box_thresh: 0.5
    det_db_unclip_ratio: 1.8
    drop_score: 0.35
  table_structure:
    enabled: true
    lang: "ch"
    recovery: true
    show_log: false
    # Plan A: re-recognize low-confidence table regions with PP-Structure.
    # Off by default (each region costs several seconds); enable to attach a
    # review-only enhanced table under the low-confidence warning.
    enhance_on_low_quality: false
    # Backend override for the enhancement tier. Empty => auto-select from
    # host_profile.local.json (vision | gridboost | manual | ppstructure).
    # "ppstructurev3" forces the PaddleOCR 3.x PP-StructureV3 backend for
    # low-confidence table regions (never auto-selected; needs paddleocr 3.x).
    # It only runs on regions the applicability pre-check flags as a regular
    # ruled table; flowcharts / ultra-dense matrices keep the human-review
    # fallback. Result is a review-only compare block; main output unchanged.
    backend: ""
    # Isolated paddleocr-3.x python for the PP-StructureV3 backend. When set,
    # V3 runs via subprocess so the main env can stay on paddleocr 2.7.3 (its
    # text OCR is unchanged). Empty => run in-process only if paddleocr 3.x is
    # importable, else skip (plan-B output kept). Example:
    #   ppstructurev3_python: "D:/ocr_probe/venv_ppv3/Scripts/python.exe"
    ppstructurev3_python: ""
    # Local vision-model backend (vision tier) settings. Used only when the
    # host profile selects the "vision" tier (or backend is forced to
    # "vision"/"vision_local"). Runs offline via the local ollama server.
    vision_model: "qwen2.5vl:3b"
    vision_timeout: 180
    # Direction-3: per-region VLM rebuild for scrambled-layout slides.
    # OFF by default. When on, only pages the generator flags as scrambled
    # are split into regions, each transcribed by the local VLM at full
    # resolution; the stitched result REPLACES the body only if it passes
    # the per-token consistency guard, else it is shown as a compare block.
    region_rebuild: false
    region_rebuild_adopt: true
    region_overlap: 0.08
    rebuild_hit_min: 0.9
    rebuild_fabricate_max: 0.05
    rebuild_struct_min: 0.5
    rebuild_max_regions: 6
    crop_pad: 14
    max_enhance_regions: 4
    # --- PP-StructureV3 adopt gate (calibrated 2026-07-08, 13 regions) ----
    # When enhance_adopt is true, an enhanced table may REPLACE the plan-B
    # table in the body (not just attach a compare block) if ALL hold:
    #   S_b < adopt_sb_max  AND  (S_e - S_b) >= enhance_adopt_margin  AND
    #   S_e >= adopt_se_min.  Otherwise it stays a review-only compare block.
    # Calibration finding: on this host's PP-StructureV3, S_e (structure-only)
    # does NOT track content correctness -- across all 6 successful sample
    # regions the V3 table was not content-better than plan-B (e.g. 121125 r02
    # scored S_e=0.886 but the matrix digits were still scrambled). So the
    # thresholds are deliberately tightened to ZERO false-adopt on the sample:
    # the gate is ready but will not trigger here until a stronger table model
    # is available. Default OFF -> review-only, byte-identical to before.
    # Thresholds live here so they can be tuned without code changes.
    enhance_adopt: false
    enhance_adopt_margin: 0.30
    adopt_sb_max: 0.55
    adopt_se_min: 0.90
  ollama:
    model: "qwen2.5:1.5b"
    endpoint: "http://localhost:11434"

image:
  super_resolution:
    model: "real-esrgan"
    scale: 2
  color_extraction:
    kmeans_clusters: 8
  table_detection:
    use_model: "paddle_layout"

logging:
  level: "INFO"
  file: "logs/pipeline.log"
  format: "json"
